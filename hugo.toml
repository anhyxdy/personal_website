baseURL = 'https://example.org/'
locale = 'zh-cn'
title = "anh's diary"
theme = 'stack'
defaultContentLanguage = 'zh-cn'
hasCJKLanguage = true

[params]
  mainSections = ["post"]
  [params.sidebar]
    emoji = "📝"
    subtitle = "个人日记 & 笔记"
    [params.sidebar.avatar]
      enabled = true
      local = true
      src = "img/avatar.png"
  
  [params.footer]
    since = 2026

  [params.article]
    toc = true
    readingTime = true

  [params.colorScheme]
    toggle = true
    default = "auto"

  [params.widgets]
    [[params.widgets.homepage]]
      type = "search"
    [[params.widgets.homepage]]
      type = "archives"
      [params.widgets.homepage.params]
        limit = 5
    [[params.widgets.homepage]]
      type = "categories"
      [params.widgets.homepage.params]
        limit = 10
    [[params.widgets.homepage]]
      type = "tag-cloud"
      [params.widgets.homepage.params]
        limit = 10

[[menu.main]]
  identifier = "home"
  name = "首页"
  url = "/"
  weight = 1

[[menu.social]]
  identifier = "github"
  name = "GitHub"
  url = "https://github.com/anhyxdy"
  [menu.social.params]
    icon = "brand-github"

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
  [markup.tableOfContents]
    endLevel = 4
    ordered = true
    startLevel = 2
  [markup.highlight]
    noClasses = false
    codeFences = true
    guessSyntax = true
    lineNos = true
    tabWidth = 4
